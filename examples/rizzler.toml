# rizzler Configuration Example
# Place this file as '.rizzler' in your project root to configure repository-specific settings
# Alternatively, use 'rizzler config set' or environment variables for more dynamic configuration

# AI Provider Configuration
[ai_provider]
# Which AI provider to use by default (openai, anthropic/claude, gemini/google, bedrock/aws)
default_provider = "openai"

# Model to use for the selected provider
# OpenAI options: "gpt-4-turbo", "gpt-4", "gpt-3.5-turbo"
# Claude options: "claude-3-opus-20240229", "claude-3-sonnet-20240229"
# Gemini options: "gemini-pro"
# Bedrock options depend on which models you have access to in your AWS account
default_model = "gpt-4-turbo"

# Custom system prompt to override the default one
# This controls how the AI approaches conflict resolution
system_prompt = """
You are an expert software developer helping to resolve Git merge conflicts.
Analyze the provided code conflicts and resolve them in a way that preserves
the intent of both changes whenever possible. When resolving conflicts, consider
the context of the entire file and follow the existing code style.
Provide a clean resolution without conflict markers.
"""

# Timeout for AI requests in seconds
timeout_seconds = 30

# Resolution strategy configuration
[resolution]
# Default resolution strategy to use
# Options:
#   "ai" - Use AI to resolve conflicts intelligently (default)
#   "whitespace-only" - Simple rule-based resolution for whitespace-only conflicts
#   "ai-fallback" - Try multiple AI providers in sequence if the primary one fails
default_strategy = "ai"

# Extension-specific strategies
# Map file extensions to specific resolution strategies
[resolution.extension_strategies]
# Use AI for code files
"js" = "ai"
"ts" = "ai"
"py" = "ai"
"rs" = "ai"
"go" = "ai"
"java" = "ai"

# Only resolve whitespace conflicts in these files
"md" = "whitespace-only"
"txt" = "whitespace-only"

# Use fallback strategy for more critical files
"json" = "ai-fallback"
"yaml" = "ai-fallback"
"toml" = "ai-fallback"

# Git integration configuration
[git]
# File extensions to associate with rizzler when running 'rizzler setup'
# This can be specified via CLI too: 'rizzler setup --extensions js ts py rs go java'
file_extensions = ["js", "ts", "py", "rs", "go", "java", "md", "json", "yaml", "toml"]

# Logging configuration
[logging]
# Log level (error, warn, info, debug, trace)
level = "info"

# Path to log file (if not specified, logs to stdout only)
file = "logs/rizzler.log"

# Log rotation settings
[logging.rotation]
# Rotation frequency (daily, hourly, never)
frequency = "daily"

# Maximum number of log files to keep
max_files = 7

# Maximum size of each log file
max_file_size = "10MB"

# AI Provider-specific settings
# These can also be set via environment variables

# OpenAI settings
# Environment variables:
# - RIZZLER_OPENAI_API_KEY - API key (required)
# - RIZZLER_OPENAI_BASE_URL - Base URL (optional, for Azure or self-hosted endpoints)
# - RIZZLER_OPENAI_ORG_ID - Organization ID (optional)
# - RIZZLER_OPENAI_MAX_TOKENS - Maximum tokens for completion (optional)

# Claude settings
# Environment variables:
# - RIZZLER_CLAUDE_API_KEY - API key (required)

# Gemini settings
# Environment variables:
# - RIZZLER_GEMINI_API_KEY - API key (required)

# AWS Bedrock settings
# Uses standard AWS credential chain:
# - Environment variables (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)
# - Shared credentials file (~/.aws/credentials)
# - IAM role for Amazon EC2/ECS
# - RIZZLER_BEDROCK_REGION - AWS region (if not using default)

# Advanced: Retry Configuration
# Environment variables:
# - RIZZLER_USE_RETRIES - Enable/disable retries (true/false, default: true)
# - RIZZLER_MAX_RETRIES - Maximum retry attempts (default: 3)
# - RIZZLER_INITIAL_BACKOFF_MS - Initial backoff time in ms (default: 1000)
# - RIZZLER_MAX_BACKOFF_MS - Maximum backoff time in ms (default: 30000)
# - RIZZLER_BACKOFF_MULTIPLIER - Backoff multiplier (default: 2.0)
# - RIZZLER_JITTER_FACTOR - Jitter factor for randomness (default: 0.1)

# Advanced: AI Fallback Configuration
# Environment variables:
# - RIZZLER_USE_FALLBACK - Enable/disable fallback (true/false)
# - RIZZLER_FALLBACK_ORDER - Comma-separated list of providers to try in order
#   e.g., "openai,claude,gemini,bedrock"

# Advanced: Caching Configuration
# Environment variables:
# - RIZZLER_USE_CACHE - Enable/disable caching (true/false, default: true)
# - RIZZLER_CACHE_DIR - Directory to store cache files (default: system temp dir)
# - RIZZLER_CACHE_TTL_HOURS - Time-to-live for cache entries in hours (default: 24) 